<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Random Repository</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1 class="title">GitHub Random Repository</h1>
        <p class="subtitle">Discover a random repository from GitHub</p>
        
        <div class="controls">
            <select id="languageSelect" class="language-select">
                <option value="">Select a language</option>
            </select>
            <button id="findRepoBtn" class="btn btn-primary">Find Repository</button>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="state loading-state hidden">
            <div class="spinner"></div>
            <p>Fetching repository...</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="state error-state hidden">
            <div class="error-icon">❌</div>
            <p id="errorMessage">Error fetching repository. Please try again.</p>
            <button id="retryBtn" class="btn btn-secondary">Retry</button>
        </div>

        <!-- Repository Card -->
        <div id="repoCard" class="repo-card hidden">
            <div class="repo-header">
                <h2 id="repoName" class="repo-name"></h2>
                <a id="repoLink" href="#" target="_blank" class="repo-link">View on GitHub →</a>
            </div>
            <p id="repoDescription" class="repo-description"></p>
            
            <div class="repo-stats">
                <div class="stat">
                    <span class="stat-icon">⭐</span>
                    <span id="starsCount" class="stat-value"></span>
                    <span class="stat-label">Stars</span>
                </div>
                <div class="stat">
                    <span class="stat-icon">🍴</span>
                    <span id="forksCount" class="stat-value"></span>
                    <span class="stat-label">Forks</span>
                </div>
                <div class="stat">
                    <span class="stat-icon">📋</span>
                    <span id="issuesCount" class="stat-value"></span>
                    <span class="stat-label">Open Issues</span>
                </div>
            </div>

            <div class="repo-meta">
                <span id="repoLanguage" class="language-badge"></span>
                <span id="repoCreated" class="created-date"></span>
            </div>

            <button id="refreshBtn" class="btn btn-secondary refresh-btn">🔄 Refresh Repository</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
